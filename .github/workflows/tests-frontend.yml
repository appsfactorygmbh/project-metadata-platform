name: Frontend_Unit_Tests_and_SonarCloud_Analysis

env:
  SONAR_ORGANIZATION_KEY: "appsfactory"
  SONAR_PROJECT_KEY: "appsfactory_project-metadata-platform-frontend"

defaults:
  run:
    working-directory: src/frontend

on:
  push:
    paths:
      - "src/frontend/**"
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  install:
    name: Install Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      # https://github.com/actions/setup-node/issues/899
      - name: setup corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "26.x"
          cache: "yarn"
          cache-dependency-path: "src/frontend/yarn.lock"

      - name: Install Dependencies
        run: |
          npm install -g corepack
          corepack enable
          yarn install --immutable

  style_check:
    name: Style Checking (Prettier)
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: setup corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "26.x"
          cache: "yarn"
          cache-dependency-path: "src/frontend/yarn.lock"

      - name: Install Dependencies
        run: yarn install --immutable

      - name: Run Prettier Check
        run: npx prettier --check .

  type_check:
    name: Type Checking (TypeScript)
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: setup corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "26.x"
          cache: "yarn"
          cache-dependency-path: "src/frontend/yarn.lock"

      - name: Install Dependencies
        run: yarn install --immutable

      - name: Run Type Check
        run: |
          corepack enable
          yarn type-check

  lint_check:
    name: Lint Checking (ESLint)
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: setup corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "26.x"
          cache: "yarn"
          cache-dependency-path: "src/frontend/yarn.lock"

      - name: Install Dependencies
        run: yarn install --immutable

      - name: Run Lint Check
        run: |
          corepack enable
          yarn lint:check .

  unit_tests_and_sonar:
    name: Unit Tests, Coverage & SonarCloud
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: setup corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "26.x"
          cache: "yarn"
          cache-dependency-path: "src/frontend/yarn.lock"

      - name: Install Dependencies
        run: yarn install --immutable

      - name: Run tests and collect coverage
        run: |
          corepack enable
          yarn coverage
        env:
          NODE_OPTIONS: "--no-experimental-webstorage"

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_FRONTEND }}
        with:
          args: >
            -Dsonar.organization=${{ env.SONAR_ORGANIZATION_KEY }}
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}
            -Dsonar.javascript.lcov.reportPaths=src/frontend/coverage/lcov.info
            -Dsonar.sources=src/frontend/src
            -Dsonar.exclusions=**/__tests__/**,**/__mocks__/**,**/*.spec.ts,**/*.test.ts,**/generated/**

  integration_test:
    name: Integration Tests (Cypress)
    runs-on: ubuntu-latest
    needs: install
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          lfs: true
          persist-credentials: false
      - name: setup corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "26.x"
          cache: "yarn"
          cache-dependency-path: "src/frontend/yarn.lock"

      - name: Cache Cypress Binary
        uses: actions/cache@v6
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ runner.os }}-${{ hashFiles('src/frontend/yarn.lock') }}
          restore-keys: |
            cypress-${{ runner.os }}-

      - name: Install Dependencies
        run: yarn install --immutable

      - name: Install Cypress Binary
        run: npx cypress install
      - name: Cypress run
        uses: cypress-io/github-action@v7
        with:
          start: yarn preview --host 127.0.0.1 --port 8080
          wait-on: "http://127.0.0.1:8080"
          command: npx cypress run --headless --e2e -b chrome
          build: yarn build
          working-directory: src/frontend

      - name: Create Pull Request with Updated Screenshots
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs: update README screenshots"
          title: "update README screenshots"
          branch: "chore/update-screenshots"
          add-paths: "screenshots/*.png"
