name: Build_and_Push_Docker_Image

on:
  pull_request:
    types:
      - closed
    branches:
      - main
  release:
    types:
      - published
jobs:
  build-and-push:
    if: github.event_name == 'release' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read Current Version
        id: get_version
        run: |
          VERSION=$(jq -r '."."[1:]' .manifest.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Generate date tag using Ubuntu 'date' command
        id: date
        run: echo "tag=$(date +'%Y.%m.%d-%H.%M')" >> $GITHUB_OUTPUT

      - name: Determine Docker Tags
        id: tags
        run: |
          if [ "${{ github.event_name }}" == "release" ]; then
            echo "TAGS=ghcr.io/${{ github.repository }}:${{ github.event.release.tag_name }},ghcr.io/${{ github.repository }}:latest,ghcr.io/${{ github.repository }}:stable" >> $GITHUB_OUTPUT
          else
            echo "TAGS=ghcr.io/${{ github.repository }}:v${{ steps.get_version.outputs.version }}.${{ steps.date.outputs.tag }},ghcr.io/${{ github.repository }}:latest" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deployment/docker/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.TAGS }}
